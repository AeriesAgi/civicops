name: Android APK

on:
  push:
    paths:
      - 'mobile/CivicOpsAndroid/**'
      - '.github/workflows/android-apk.yml'
  pull_request:
    paths:
      - 'mobile/CivicOpsAndroid/**'
      - '.github/workflows/android-apk.yml'
  workflow_dispatch:

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile/CivicOpsAndroid
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Build debug APK
        run: ./gradlew assembleDebug
      - name: Copy APK into web downloads path
        run: ./gradlew copyDebugApkToWeb
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CivicOpsCitizenCompanion-debug-apk
          path: wwwroot/downloads/CivicOpsCitizenCompanion-debug.apk
          if-no-files-found: error
